{{ define "main" }}
<section class="py-16 bg-gradient-to-br from-primary-50 via-white to-accent-50">
  <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="text-center mb-10">
      {{ with .Params.badge }}
        <span class="inline-block px-4 py-2 bg-primary-100 text-primary-700 rounded-full text-sm font-semibold mb-6">
          {{ . }}
        </span>
      {{ end }}
      <h1 class="text-4xl md:text-5xl font-bold text-slate-900 mb-6">
        {{ .Title }}
      </h1>
      {{ with .Params.subtitle }}
        <p class="text-xl text-slate-600 max-w-2xl mx-auto">
          {{ . }}
        </p>
      {{ end }}
    </div>

    {{ with .Params.image }}
      <div class="mb-10 rounded-2xl overflow-hidden shadow-xl">
        <img src="{{ . }}" alt="{{ $.Title }}" class="w-full h-64 md:h-96 object-cover" />
      </div>
    {{ end }}

    {{ partial "prose-content.html" (dict "content" .Content "class" "mb-14") }}
  </div>
</section>
{{ end }}
